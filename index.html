<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parsecs Wiki Starmap - Sol System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Parsecs Wiki Starmap</h1>
    <div class="subtitle">Sol System</div>
    
    <svg id="svg" width="1400" height="900"></svg>
    
    <div id="tooltip"></div>
    
    <div id="sidebar">
        <button id="close-btn">×</button>
        <h2 id="side-name"></h2>
        <div class="type" id="side-type"></div>
        <div class="diameter" id="side-diameter"></div>
        <p id="side-desc"></p>
        <a href="#" id="side-link" target="_blank">→ EXPLORE ON WIKIPEDIA</a>
    </div>
    
    <div class="legend">
        • Hover for quick info<br>
        • Click on body to open link & sidebar<br>
        • Zoom & pan with mouse wheel / drag<br>
    </div>

    <script>
        // Load data → then initialize visualization
            const svg = d3.select("#svg")
                .attr("width",  width)
                .attr("height", height)
                .style("background", "#050508");   // just in case
        
            const g = svg.append("g");
        
            // Background stars – more of them for larger canvas
            const stars = [];
            for (let i = 0; i < 1200; i++) {   // ×4–5 more stars
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    r: Math.random() * 1.4 + 0.4
                });
            }
            g.selectAll(".bg-star")
                .data(stars)
                .enter()
                .append("circle")
                .attr("class", "bg-star")
                .attr("cx", d => d.x)
                .attr("cy", d => d.y)
                .attr("r",  d => d.r)
                .attr("fill", "#ffffff")
                .attr("opacity", d => Math.random() * 0.5 + 0.35);
        
            // ────────────────────────────────────────────────
            // Compute positions
            // ────────────────────────────────────────────────
            const positions = {};
            positions.sun = { x: centerX, y: centerY };
        
            solarBodies.filter(b => b.parent === "sun").forEach(body => {
                const r = body.orbitRadius;   // now in pixels (large)
                const ang = body.angle;
                positions[body.id] = {
                    x: centerX + r * Math.cos(ang),
                    y: centerY + r * Math.sin(ang)
                };
            });
        
            solarBodies.filter(b => b.parent && b.parent !== "sun").forEach(body => {
                const parentPos = positions[body.parent];
                // Moons use fixed pixel radius (not AU-scaled) → visible without crazy zoom
                const r = (body.orbitRadius || 40) * moonScale;
                const ang = body.angle;
                positions[body.id] = {
                    x: parentPos.x + r * Math.cos(ang),
                    y: parentPos.y + r * Math.sin(ang)
                };
            });
        
            // ────────────────────────────────────────────────
            // Orbits
            // ────────────────────────────────────────────────
            const planetOrbitData = solarBodies.filter(b => b.parent === "sun" && b.orbitRadius > 0);
            g.selectAll(".planet-orbit")
                .data(planetOrbitData)
                .enter()
                .append("circle")
                .attr("cx", centerX)
                .attr("cy", centerY)
                .attr("r", d => d.orbitRadius)
                .attr("fill", "none")
                .attr("stroke", "#1a2a3a")
                .attr("stroke-width", 2.2)
                .attr("stroke-dasharray", "3,6");
        
            const moonOrbitData = solarBodies.filter(b => b.parent && b.parent !== "sun");
            g.selectAll(".moon-orbit")
                .data(moonOrbitData)
                .enter()
                .append("circle")
                .attr("cx", d => positions[d.parent].x)
                .attr("cy", d => positions[d.parent].y)
                .attr("r", d => (d.orbitRadius || 40) * moonScale)
                .attr("fill", "none")
                .attr("stroke", "#2a3a4a")
                .attr("stroke-width", 1.4)
                .attr("stroke-dasharray", "2,4");
        
            // ────────────────────────────────────────────────
            // Bodies & labels (same as before, just larger canvas context)
            // ────────────────────────────────────────────────
            const bodyGroups = g.selectAll(".body-group")
                .data(solarBodies)
                .enter()
                .append("g")
                .attr("class", "body-group")
                .attr("transform", d => `translate(${positions[d.id].x}, ${positions[d.id].y})`);
        
            bodyGroups.append("circle")
                .attr("class", "body-circle")
                .attr("r", d => d.displayRadius)
                .attr("fill", d => d.color)
                .attr("stroke", "#ffffff")
                .attr("stroke-width", d => d.id === "sun" ? 4 : 2.2)
                .attr("stroke-opacity", 0.85);
        
            // Sun corona/glow
            bodyGroups.filter(d => d.id === "sun")
                .append("circle")
                .attr("r", 52)
                .attr("fill", "#FFEE88")
                .attr("opacity", 0.16);
        
            bodyGroups.append("text")
                .attr("y", d => d.displayRadius + 24)
                .attr("text-anchor", "middle")
                .attr("fill", "#d0e0ff")
                .attr("font-size", d => d.displayRadius > 14 ? 13 : 11)
                .attr("font-weight", 500)
                .attr("letter-spacing", 0.4)
                .text(d => d.name);
        
            // ────────────────────────────────────────────────
            // Interactivity (unchanged except possibly tooltip offset)
            // ────────────────────────────────────────────────
            const tooltip = d3.select("#tooltip");
        
            bodyGroups.on("mouseover", function(event, d) {
                const info = `${d.name}<br><span style="color:#88bbff">${d.type.toUpperCase()}</span><br>Diameter: ${d.diameter.toLocaleString()} km`;
                tooltip
                    .html(info)
                    .style("display", "block")
                    .style("left", (event.pageX + 24) + "px")
                    .style("top",  (event.pageY - 16) + "px");
            })
            .on("mouseout", () => tooltip.style("display", "none"))
            .on("click", function(event, d) {
                if (d.link) window.open(d.link, "_blank");
                showSidebar(d);
            });
        
            // Zoom & Pan – allow deeper zoom now that things are spread out
            const zoomBehavior = d3.zoom()
                .scaleExtent([0.08, 18])          // ← wider range
                .on("zoom", (event) => g.attr("transform", event.transform));
        
            svg.call(zoomBehavior);
        
            // Sidebar & other handlers remain the same...
            function showSidebar(body) { /* unchanged */ }
            window.hideSidebar = function() { /* unchanged */ };
        
            svg.on("click", (event) => {
                if (event.target.tagName === "svg") hideSidebar();
            });
        
            document.addEventListener("keydown", (e) => {
                if (e.key.toLowerCase() === "r") {
                    svg.transition().duration(1200).call(zoomBehavior.transform, d3.zoomIdentity);
                }
            });
        
            // ────────────────────────────────────────────────
            // Initial view – more zoomed out because map is huge
            // ────────────────────────────────────────────────
            setTimeout(() => {
                svg.transition().duration(1400)
                    .call(zoomBehavior.transform,
                        d3.zoomIdentity
                            .scale(0.38)               // ← start farther out
                            .translate(width*0.08, height*0.12)
                    );
            }, 300);
        
            }).catch(error => {
            console.error("Error loading solar-system.json:", error);
            document.body.innerHTML += "<h2 style='color:red; text-align:center;'>Failed to load solar-system.json</h2>";
        });
        
        // Close button
        document.getElementById("close-btn").addEventListener("click", hideSidebar);
        </script>
</body>
</html>
