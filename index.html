<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System • Hard Sci-Fi Novel Map</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: #050508;
            color: #eee;
            font-family: 'Inter', system_ui, sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        
        h1 {
            position: absolute;
            top: 20px;
            left: 30px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -1px;
            margin: 0;
            color: #fff;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.6);
            z-index: 100;
            pointer-events: none;
        }
        
        .subtitle {
            position: absolute;
            top: 58px;
            left: 30px;
            font-size: 13px;
            color: #88aaff;
            letter-spacing: 2px;
            z-index: 100;
            pointer-events: none;
        }
        
        svg {
            display: block;
        }
        
        #tooltip {
            position: absolute;
            background: rgba(10, 15, 35, 0.96);
            color: #fff;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            pointer-events: none;
            z-index: 200;
            border: 1px solid #334466;
            display: none;
            max-width: 220px;
            line-height: 1.4;
        }
        
        #sidebar {
            position: fixed;
            right: 30px;
            top: 30px;
            width: 340px;
            background: rgba(12, 18, 40, 0.97);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 180, 255, 0.15);
            padding: 24px;
            color: #eee;
            z-index: 300;
            display: none;
            border: 1px solid #445577;
            font-size: 14px;
            line-height: 1.5;
        }
        
        #sidebar h2 {
            margin: 0 0 12px 0;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            color: #aaffff;
        }
        
        #sidebar .type {
            color: #88ccff;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }
        
        #sidebar .diameter {
            color: #99aabb;
            font-size: 13px;
            margin-bottom: 20px;
        }
        
        #sidebar p {
            margin: 0 0 22px 0;
            color: #ccddee;
        }
        
        #sidebar a {
            display: inline-block;
            background: #1a2a55;
            color: #aaffff;
            padding: 8px 18px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        #sidebar a:hover {
            background: #2a4a88;
            color: #fff;
        }
        
        #close-btn {
            position: absolute;
            top: 18px;
            right: 18px;
            background: none;
            border: none;
            color: #667788;
            font-size: 28px;
            cursor: pointer;
            line-height: 1;
            padding: 0;
            width: 30px;
            height: 30px;
        }
        
        .legend {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background: rgba(10, 15, 35, 0.7);
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 12px;
            color: #8899bb;
            z-index: 100;
            border: 1px solid #334466;
        }
        
        .body-circle {
            cursor: pointer;
            transition: filter 0.15s;
        }
        
        .body-circle:hover {
            filter: brightness(1.25) saturate(1.3);
        }
    </style>
</head>
<body>
    <h1>SOLAR SYSTEM</h1>
    <div class="subtitle">STATIC MAP • REAL ORBITS • HARD SCI-FI NOVEL</div>
    
    <svg id="svg" width="1400" height="900"></svg>
    
    <div id="tooltip"></div>
    
    <div id="sidebar">
        <button id="close-btn" onclick="hideSidebar()">×</button>
        <h2 id="side-name"></h2>
        <div class="type" id="side-type"></div>
        <div class="diameter" id="side-diameter"></div>
        <p id="side-desc"></p>
        <a href="#" id="side-link" target="_blank">→ EXPLORE ON WIKIPEDIA</a>
    </div>
    
    <div class="legend">
        • Hover for quick info<br>
        • Click body → open link + sidebar<br>
        • Zoom &amp; pan with mouse wheel / drag<br>
        • Real relative distances (AU scale = 12 px)
    </div>

    <script>
        // ==================== DATA (normally loaded from stars.json) ====================
        // Embedded for single-file self-contained experience
        const scaleAU = 12;
        
        const solarBodies = [
            // SUN
            {
                id: "sun",
                name: "Sun",
                type: "star",
                parent: null,
                orbitRadius: 0,
                angle: 0,
                displayRadius: 28,
                color: "#FFEE77",
                description: "The G-type main-sequence star that anchors the entire Solar System. Fusion-powered furnace providing all energy for life and fiction.",
                link: "https://en.wikipedia.org/wiki/Sun",
                diameter: 1392680
            },
            // PLANETS (heliocentric orbits)
            {
                id: "mercury",
                name: "Mercury",
                type: "planet",
                parent: "sun",
                orbitRadius: 0.387 * scaleAU,
                angle: 0.9,
                displayRadius: 5.5,
                color: "#B8B8B8",
                description: "Smallest planet, extreme temperature swings. Prime location for solar-power colonies in hard sci-fi.",
                link: "https://en.wikipedia.org/wiki/Mercury_(planet)",
                diameter: 4879
            },
            {
                id: "venus",
                name: "Venus",
                type: "planet",
                parent: "sun",
                orbitRadius: 0.723 * scaleAU,
                angle: 2.4,
                displayRadius: 9,
                color: "#E0C080",
                description: "Earth's toxic twin. Thick CO₂ atmosphere and runaway greenhouse — perfect for terraforming challenges.",
                link: "https://en.wikipedia.org/wiki/Venus",
                diameter: 12104
            },
            {
                id: "earth",
                name: "Earth",
                type: "planet",
                parent: "sun",
                orbitRadius: 1 * scaleAU,
                angle: 0.6,
                displayRadius: 10,
                color: "#3A9EDB",
                description: "Our blue marble. The only known world with liquid surface water and life — until the novel changes that.",
                link: "https://en.wikipedia.org/wiki/Earth",
                diameter: 12742
            },
            {
                id: "mars",
                name: "Mars",
                type: "planet",
                parent: "sun",
                orbitRadius: 1.524 * scaleAU,
                angle: 4.1,
                displayRadius: 7,
                color: "#D56A3C",
                description: "The Red Planet. Future home of the first interplanetary civilization in our story.",
                link: "https://en.wikipedia.org/wiki/Mars",
                diameter: 6779
            },
            {
                id: "jupiter",
                name: "Jupiter",
                type: "planet",
                parent: "sun",
                orbitRadius: 5.203 * scaleAU,
                angle: 3.3,
                displayRadius: 18,
                color: "#D8A568",
                description: "Gas giant. Source of helium-3 for fusion drives and protector of the inner system.",
                link: "https://en.wikipedia.org/wiki/Jupiter",
                diameter: 139820
            },
            {
                id: "saturn",
                name: "Saturn",
                type: "planet",
                parent: "sun",
                orbitRadius: 9.537 * scaleAU,
                angle: 5.7,
                displayRadius: 15,
                color: "#E0D0A0",
                description: "Magnificent ringed world. Ice mining operations and helium-3 harvesting hub.",
                link: "https://en.wikipedia.org/wiki/Saturn",
                diameter: 120536
            },
            {
                id: "uranus",
                name: "Uranus",
                type: "planet",
                parent: "sun",
                orbitRadius: 19.191 * scaleAU,
                angle: 1.8,
                displayRadius: 11,
                color: "#A0E0FF",
                description: "Ice giant, tilted on its side. Future outpost for deep-space refueling.",
                link: "https://en.wikipedia.org/wiki/Uranus",
                diameter: 51118
            },
            {
                id: "neptune",
                name: "Neptune",
                type: "planet",
                parent: "sun",
                orbitRadius: 30.07 * scaleAU,
                angle: 4.9,
                displayRadius: 11,
                color: "#4B70DD",
                description: "Windy ice giant. Last stop before the Kuiper Belt in our novel's expansion.",
                link: "https://en.wikipedia.org/wiki/Neptune",
                diameter: 49528
            },
            // DWARF PLANET
            {
                id: "pluto",
                name: "Pluto",
                type: "dwarf planet",
                parent: "sun",
                orbitRadius: 39.48 * scaleAU,
                angle: 2.9,
                displayRadius: 4.5,
                color: "#C8C8C8",
                description: "Icy world at the edge. Symbol of the frontier in hard sci-fi.",
                link: "https://en.wikipedia.org/wiki/Pluto",
                diameter: 2377
            },
            // MOONS (planetary orbits – exaggerated pixel distances for visibility)
            {
                id: "moon",
                name: "Moon",
                type: "moon",
                parent: "earth",
                orbitRadius: 38,
                angle: 1.2,
                displayRadius: 6,
                color: "#D0D0D0",
                description: "Earth's natural satellite. First stepping stone for humanity's expansion.",
                link: "https://en.wikipedia.org/wiki/Moon",
                diameter: 3475
            },
            {
                id: "phobos",
                name: "Phobos",
                type: "moon",
                parent: "mars",
                orbitRadius: 14,
                angle: 0.4,
                displayRadius: 2.5,
                color: "#A0A0A0",
                description: "Inner Martian moon. Future space elevator anchor.",
                link: "https://en.wikipedia.org/wiki/Phobos_(moon)",
                diameter: 22
            },
            {
                id: "deimos",
                name: "Deimos",
                type: "moon",
                parent: "mars",
                orbitRadius: 22,
                angle: 3.1,
                displayRadius: 2,
                color: "#B0B0B0",
                description: "Outer Martian moon. Quiet research outpost in the novel.",
                link: "https://en.wikipedia.org/wiki/Deimos_(moon)",
                diameter: 12
            },
            {
                id: "io",
                name: "Io",
                type: "moon",
                parent: "jupiter",
                orbitRadius: 29,
                angle: 0.8,
                displayRadius: 5.5,
                color: "#FFAA44",
                description: "Most volcanically active body in the Solar System.",
                link: "https://en.wikipedia.org/wiki/Io_(moon)",
                diameter: 3643
            },
            {
                id: "europa",
                name: "Europa",
                type: "moon",
                parent: "jupiter",
                orbitRadius: 38,
                angle: 2.6,
                displayRadius: 5,
                color: "#88CCFF",
                description: "Icy moon with subsurface ocean — prime candidate for extraterrestrial life.",
                link: "https://en.wikipedia.org/wiki/Europa_(moon)",
                diameter: 3122
            },
            {
                id: "ganymede",
                name: "Ganymede",
                type: "moon",
                parent: "jupiter",
                orbitRadius: 49,
                angle: 4.3,
                displayRadius: 7,
                color: "#C0C0C0",
                description: "Largest moon in the Solar System. Magnetic field and possible ocean.",
                link: "https://en.wikipedia.org/wiki/Ganymede_(moon)",
                diameter: 5268
            },
            {
                id: "callisto",
                name: "Callisto",
                type: "moon",
                parent: "jupiter",
                orbitRadius: 62,
                angle: 5.9,
                displayRadius: 6.5,
                color: "#A8A8A8",
                description: "Heavily cratered, ancient surface. Ideal for long-term bases.",
                link: "https://en.wikipedia.org/wiki/Callisto_(moon)",
                diameter: 4821
            },
            {
                id: "titan",
                name: "Titan",
                type: "moon",
                parent: "saturn",
                orbitRadius: 55,
                angle: 1.5,
                displayRadius: 7,
                color: "#E0C090",
                description: "Thick nitrogen atmosphere and methane lakes. Perfect for human settlement stories.",
                link: "https://en.wikipedia.org/wiki/Titan_(moon)",
                diameter: 5150
            }
        ];

        // ==================== SETUP ====================
        const width = 1400;
        const height = 900;
        const centerX = width / 2;
        const centerY = height / 2;

        const svg = d3.select("#svg")
            .attr("width", width)
            .attr("height", height);

        const g = svg.append("g");

        // Background star field (static dots that zoom with everything)
        const stars = [];
        for (let i = 0; i < 280; i++) {
            stars.push({
                x: Math.random() * width,
                y: Math.random() * height,
                r: Math.random() * 1.6 + 0.6
            });
        }
        g.selectAll(".bg-star")
            .data(stars)
            .enter()
            .append("circle")
            .attr("class", "bg-star")
            .attr("cx", d => d.x)
            .attr("cy", d => d.y)
            .attr("r", d => d.r)
            .attr("fill", "#ffffff")
            .attr("opacity", 0.75);

        // Compute absolute positions
        const positions = {};
        
        // Sun first
        positions.sun = { x: centerX, y: centerY };
        
        // Planets (parent = sun)
        solarBodies.filter(b => b.parent === "sun").forEach(body => {
            const r = body.orbitRadius;
            const ang = body.angle;
            positions[body.id] = {
                x: centerX + r * Math.cos(ang),
                y: centerY + r * Math.sin(ang)
            };
        });
        
        // Moons
        solarBodies.filter(b => b.parent !== null && b.parent !== "sun").forEach(body => {
            const parentPos = positions[body.parent];
            const r = body.orbitRadius;
            const ang = body.angle;
            positions[body.id] = {
                x: parentPos.x + r * Math.cos(ang),
                y: parentPos.y + r * Math.sin(ang)
            };
        });

        // ==================== DRAW ORBITS ====================
        // Planet orbits (concentric around Sun)
        const planetOrbitData = solarBodies.filter(b => b.parent === "sun" && b.orbitRadius > 0);
        g.selectAll(".planet-orbit")
            .data(planetOrbitData)
            .enter()
            .append("circle")
            .attr("cx", centerX)
            .attr("cy", centerY)
            .attr("r", d => d.orbitRadius)
            .attr("fill", "none")
            .attr("stroke", "#223344")
            .attr("stroke-width", 1.8)
            .attr("stroke-dasharray", "1,3");

        // Moon orbits (around their planets)
        const moonOrbitData = solarBodies.filter(b => b.parent !== null && b.parent !== "sun");
        g.selectAll(".moon-orbit")
            .data(moonOrbitData)
            .enter()
            .append("circle")
            .attr("cx", d => positions[d.parent].x)
            .attr("cy", d => positions[d.parent].y)
            .attr("r", d => d.orbitRadius)
            .attr("fill", "none")
            .attr("stroke", "#334455")
            .attr("stroke-width", 1)
            .attr("stroke-dasharray", "2,2");

        // ==================== DRAW BODIES ====================
        const bodyGroups = g.selectAll(".body-group")
            .data(solarBodies)
            .enter()
            .append("g")
            .attr("class", "body-group")
            .attr("transform", d => `translate(${positions[d.id].x}, ${positions[d.id].y})`);

        // Main colored circles
        bodyGroups.append("circle")
            .attr("class", "body-circle")
            .attr("r", d => d.displayRadius)
            .attr("fill", d => d.color)
            .attr("stroke", "#ffffff")
            .attr("stroke-width", d => d.id === "sun" ? 3.5 : 2)
            .attr("stroke-opacity", 0.9);

        // Sun glow (extra layer)
        bodyGroups.filter(d => d.id === "sun")
            .append("circle")
            .attr("r", 38)
            .attr("fill", "#FFEE77")
            .attr("opacity", 0.18);

        // Labels
        bodyGroups.append("text")
            .attr("y", d => d.displayRadius + 19)
            .attr("text-anchor", "middle")
            .attr("fill", "#ccddee")
            .attr("font-size", d => d.displayRadius > 12 ? 11.5 : 10)
            .attr("font-weight", 500)
            .attr("letter-spacing", 0.5)
            .text(d => d.name);

        // ==================== INTERACTIVITY ====================
        const tooltip = d3.select("#tooltip");

        bodyGroups.on("mouseover", function(event, d) {
            const info = `${d.name}<br><span style="color:#88bbff">${d.type.toUpperCase()}</span><br>Diameter: ${d.diameter.toLocaleString()} km`;
            tooltip
                .html(info)
                .style("display", "block")
                .style("left", (event.pageX + 18) + "px")
                .style("top", (event.pageY - 12) + "px");
        })
        .on("mouseout", () => {
            tooltip.style("display", "none");
        })
        .on("click", function(event, d) {
            // Open embedded Wikipedia link in new tab
            if (d.link) {
                window.open(d.link, "_blank");
            }
            // Show sidebar
            showSidebar(d);
        });

        // Zoom & Pan
        const zoomBehavior = d3.zoom()
            .scaleExtent([0.18, 9])
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
            });

        svg.call(zoomBehavior);

        // Sidebar functions
        function showSidebar(body) {
            d3.select("#side-name").text(body.name);
            d3.select("#side-type").text(body.type.toUpperCase());
            d3.select("#side-diameter").text(`Diameter: ${body.diameter.toLocaleString()} km`);
            d3.select("#side-desc").text(body.description);
            d3.select("#side-link").attr("href", body.link);
            
            d3.select("#sidebar").style("display", "block");
        }
        
        window.hideSidebar = function() {
            d3.select("#sidebar").style("display", "none");
        };

        // Optional: click anywhere on background to close sidebar
        svg.on("click", (event) => {
            if (event.target.tagName === "svg") {
                hideSidebar();
            }
        });

        // Keyboard reset zoom (press R)
        document.addEventListener("keydown", (e) => {
            if (e.key.toLowerCase() === "r") {
                svg.transition().duration(800).call(zoomBehavior.transform, d3.zoomIdentity);
            }
        });

        // Final touch: initial slight zoom out so everything is visible
        setTimeout(() => {
            svg.transition().duration(1200)
                .call(zoomBehavior.transform, d3.zoomIdentity.scale(0.92).translate(40, 30));
        }, 400);
    </script>
</body>
</html>
