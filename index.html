<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parsecs</title>
    <style>
        /* Styling for sidebar and layers */
        #sidebar {
            display: none; /* Initially hidden */
        }
        /* Other styling */
    </style>
</head>
<body>
    <div id="primary-layer">
        <h1>Planets</h1>
        <!-- Planet elements with click behavior -->
        <div class="planet" data-name="Mercury">Mercury</div>
        <div class="planet" data-name="Venus">Venus</div>
        <div class="planet" data-name="Earth">Earth</div>
        <div class="planet" data-name="Mars">Mars</div>
        <div class="sun" data-url="https://en.wikipedia.org/wiki/Sun">Sun</div>
    </div>
    <div id="secondary-layer">
        <h1>Moons</h1>
        <!-- Moon elements, now hidden -->
        <div class="moon hidden">Moon of Mercury</div>
        <div class="moon hidden">Moon of Earth</div>
    </div>
    <div id="sidebar">
        <h2>Sidebar</h2>
        <p><a href="https://en.wikipedia.org/wiki/Mercury">Mercury Wikipedia</a></p>
        <p><a href="https://en.wikipedia.org/wiki/Venus">Venus Wikipedia</a></p>
        <p><a href="https://en.wikipedia.org/wiki/Earth">Earth Wikipedia</a></p>
        <p><a href="https://en.wikipedia.org/wiki/Mars">Mars Wikipedia</a></p>
    </div>
    <script>
        // Click behavior implementation
        document.querySelectorAll('.planet').forEach(planet => {
            planet.addEventListener('click', function() {
                // Show sidebar for primary layer planets
                document.getElementById('sidebar').style.display = 'block';
            });
        });
        document.querySelector('.sun').addEventListener('click', function() {
            // Open Wikipedia directly when sun is clicked
            window.open(this.dataset.url, '_blank');
        });
    </script>
</body>
</html>
